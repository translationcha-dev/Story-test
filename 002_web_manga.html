<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>うすい社員証 | WEB漫画版</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b0f;
      --panel: #151a1f;
      --panel-2: #1b2027;
      --ink: #f6f3ed;
      --muted: #b9b3a8;
      --line: rgba(236, 226, 206, 0.16);
      --blue: #9fe8ff;
      --gold: #e8c06d;
      --danger: #ff8f70;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 0%, rgba(159, 232, 255, 0.14), transparent 32rem),
        linear-gradient(180deg, #101016 0%, var(--bg) 34rem, #07080a 100%);
      color: var(--ink);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      line-height: 1.75;
    }

    a {
      color: inherit;
    }

    .hero {
      min-height: 96svh;
      display: grid;
      align-items: end;
      background-image:
        linear-gradient(90deg, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.2) 54%, rgba(0, 0, 0, 0.76)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.05), rgba(9, 11, 15, 0.94)),
        url("002_10分版_絵コンテ画像_軽量版/eyecatch_youtube_thumbnail_16x9.jpg");
      background-size: cover;
      background-position: center;
      padding: clamp(22px, 4vw, 58px);
    }

    .hero-copy {
      max-width: 820px;
      padding-bottom: 8vh;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px;
      color: var(--blue);
      font-size: clamp(0.8rem, 1.6vw, 0.96rem);
      font-weight: 800;
      letter-spacing: 0;
    }

    .eyebrow::before {
      content: "";
      width: 36px;
      height: 2px;
      background: var(--blue);
      box-shadow: 0 0 18px rgba(159, 232, 255, 0.8);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.7rem, 9vw, 7rem);
      line-height: 0.98;
      letter-spacing: 0;
      text-shadow: 0 6px 28px rgba(0, 0, 0, 0.85);
    }

    .tagline {
      max-width: 38rem;
      margin: 22px 0 0;
      color: #fffaf0;
      font-size: clamp(1.02rem, 2vw, 1.34rem);
      font-weight: 700;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.8);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border: 1px solid rgba(159, 232, 255, 0.45);
      border-radius: 8px;
      background: rgba(10, 14, 18, 0.72);
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      backdrop-filter: blur(8px);
    }

    .button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #f9f0dc, #9fe8ff);
      color: #071018;
      box-shadow: 0 14px 44px rgba(159, 232, 255, 0.2);
    }

    .intro {
      max-width: 1000px;
      margin: 0 auto;
      padding: 42px clamp(18px, 4vw, 42px) 22px;
      color: var(--muted);
    }

    .intro strong {
      color: var(--ink);
    }

    .chapter-nav {
      position: sticky;
      top: 0;
      z-index: 4;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px clamp(14px, 4vw, 32px);
      border-block: 1px solid var(--line);
      background: rgba(8, 9, 12, 0.92);
      backdrop-filter: blur(14px);
    }

    .chapter-nav a {
      flex: 0 0 auto;
      min-width: 42px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.86rem;
      text-align: center;
      text-decoration: none;
    }

    .chapter-nav a:hover,
    .chapter-nav a:focus-visible {
      color: var(--ink);
      border-color: rgba(159, 232, 255, 0.8);
      outline: none;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px clamp(12px, 4vw, 34px) 74px;
    }

    .scene {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      margin: 0 0 clamp(28px, 6vw, 56px);
      padding: clamp(12px, 2vw, 18px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(27, 32, 39, 0.98), rgba(12, 14, 18, 0.98));
      box-shadow: var(--shadow);
    }

    .scene.turning {
      border-color: rgba(255, 143, 112, 0.4);
      background: linear-gradient(180deg, rgba(39, 29, 25, 0.98), rgba(12, 14, 18, 0.98));
    }

    .scene img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 6px;
      background: #0e1116;
    }

    .scene figcaption {
      display: grid;
      gap: 12px;
    }

    .scene-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .cut-number {
      color: var(--blue);
      font-weight: 900;
    }

    .duration {
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #e7ded1;
    }

    .scene-title {
      margin: 0;
      font-size: clamp(1.1rem, 2.2vw, 1.65rem);
      line-height: 1.35;
      letter-spacing: 0;
    }

    .caption,
    .narration {
      margin: 0;
    }

    .caption {
      color: #e7dfd3;
    }

    .narration {
      color: #cfc7ba;
    }

    .quote {
      margin: 0;
      padding: 12px 14px;
      border-left: 3px solid var(--blue);
      background: rgba(159, 232, 255, 0.08);
      color: #fdf9ef;
      font-weight: 800;
    }

    .turning .quote {
      border-left-color: var(--danger);
      background: rgba(255, 143, 112, 0.1);
    }

    .script-details {
      border: 1px solid rgba(236, 226, 206, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.025);
      overflow: hidden;
    }

    .script-details summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      padding: 10px 14px;
      color: var(--blue);
      cursor: pointer;
      font-weight: 900;
      list-style: none;
      user-select: none;
    }

    .script-details summary::-webkit-details-marker {
      display: none;
    }

    .script-details summary::after {
      content: "+";
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border: 1px solid rgba(159, 232, 255, 0.35);
      border-radius: 999px;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1;
    }

    .script-details[open] summary::after {
      content: "-";
    }

    .script-block {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-top: 1px solid rgba(236, 226, 206, 0.12);
      background: rgba(255, 255, 255, 0.035);
    }

    .script-heading {
      margin: 0;
      color: var(--blue);
      font-size: 0.86rem;
      font-weight: 900;
    }

    .script-block p {
      margin: 0;
      color: #d9d0c2;
    }

    .dialogue-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .dialogue-list li {
      padding: 8px 10px;
      border-left: 3px solid rgba(232, 192, 109, 0.8);
      background: rgba(232, 192, 109, 0.08);
      color: #fff7e7;
      font-weight: 800;
    }

    .product {
      display: inline-flex;
      width: fit-content;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(232, 192, 109, 0.14);
      color: var(--gold);
      font-size: 0.84rem;
      font-weight: 900;
    }

    .ending {
      margin-top: 8px;
      padding: clamp(22px, 4vw, 38px);
      border: 1px solid rgba(159, 232, 255, 0.22);
      border-radius: 8px;
      background: #0b0e12;
      text-align: center;
    }

    .ending strong {
      display: block;
      margin-bottom: 10px;
      color: var(--ink);
      font-size: clamp(1.2rem, 3vw, 2rem);
    }

    .ending p {
      margin: 0;
      color: var(--muted);
    }

    footer {
      padding: 28px clamp(18px, 4vw, 42px) 48px;
      color: #8f897d;
      text-align: center;
      border-top: 1px solid var(--line);
    }

    @media (min-width: 860px) {
      .scene {
        grid-template-columns: minmax(0, 1.25fr) minmax(300px, 0.75fr);
        align-items: center;
      }

      .scene:nth-of-type(even) img {
        order: 2;
      }
    }

    @media (max-width: 520px) {
      .hero {
        min-height: 86svh;
        padding: 18px;
      }

      .button {
        width: 100%;
      }

      main {
        padding-inline: 10px;
      }

      .scene {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-copy">
      <p class="eyebrow">不思議な商品シリーズ WEB漫画</p>
      <h1>うすい社員証</h1>
      <p class="tagline">責任を薄くしたかった男は、最後に自分の存在まで薄くしてしまう。</p>
      <div class="actions">
        <a class="button primary" href="#comic">漫画を読む</a>
        <a class="button" href="#cut-14">社員証の登場へ</a>
      </div>
    </div>
  </header>

  <section class="intro" aria-label="作品紹介">
    <p><strong>「うすい手帳」「うすいアルバム」「うすい社員証」</strong>の3商品を、18枚の絵コンテ画像で読めるWEB漫画版にしました。責任から逃げるたびに人間関係が軽くなり、最後には誰の記憶にも残らなくなる皮肉寄りの物語です。</p>
  </section>

  <nav class="chapter-nav" aria-label="カット移動" id="chapter-nav"></nav>

  <main id="comic"></main>

  <footer>
    <p>制作素材: 002 本番制作パッケージ / 10分版絵コンテ画像18枚 / 軽量版JPEG</p>
  </footer>
